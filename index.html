<!DOCTYPE html>
<html>
<head>
<title>For You</title>
<style>
body {
  margin:0;
  background:black;
  color:#f2f2f2;
  font-family: 'Cormorant Garamond', serif;
  text-align:center;
  overflow:hidden;
}

.container {
    text-align: center;
    margin-top: 20vh;
}

h1 {
  font-weight:300;
  letter-spacing:2px;
}

.rose {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 40vw;
    transform: translate(-50%, -50%) scale(1);
    transition: transform 6s cubic-bezier(0.22, 1, 0.36, 1);
    cursor: pointer;
}
.grow {
    transform: translate(-50%, -50%) scale(40) rotate(1440deg);
}
.fade {
  opacity:0;
  transition: opacity 4s ease;
}

.show {
  opacity:1;
}
</style>
</head>

<body>

<audio id="music" src="love.mp3"></audio>

<div class="container">
  <h1>Before you continue...</h1>
  <img src="rose.PNG" class="rose" id="rose" onclick="startExperience()">
  <p>Press play</p>
  <p id="ours" class="fade" style="margin-top:40px; font-size:22px;">
    This is ours.
  </p>
</div>

<script>
function startExperience() {
  document.getElementById("music").play();

  // Erst Text zeigen
  document.getElementById("ours").classList.add("show");

  // 2 Sekunden warten, dann Rose wachsen lassen
  setTimeout(function() {
    document.getElementById("rose").classList.add("grow");
  }, 2000);

  // Danach zur nächsten Seite
  setTimeout(function() {
    window.location.href = "page2.html";
  }, 8000);
}
</script>

</body>
</html>
