<!DOCTYPE html>
<html>
<head>
<title>For You</title>
<style>
body {
    margin:0;
    background:black;
    color:#f2f2f2;
    font-family:'Cormorant Garamond', serif;
    text-align:center;
    overflow:hidden;
}

.container {
    margin-top:20vh;
}

.rose {
    position: fixed;
    width: 40vw;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(1);
    cursor: pointer;
}

.grow {
    animation: cinematicGrow 40s cubic-bezier(0.05, 0.8, 0.1, 1) forwards;
}

@keyframes cinematicGrow {
    0% {
        transform: translate(-50%, -50%) scale(1);
    }
    40% {
        transform: translate(-50%, -50%) scale(2);
    }
    70% {
        transform: translate(-50%, -50%) scale(3);
    }
    100% {
        transform: translate(-50%, -50%) scale(5);
    }


.fade {
    opacity:0;
    transition:opacity 2s ease;
}

.show {
    opacity:1;
}
</style>
</head>

<body>

<audio id="music" src="love.mp3"></audio>

<div class="container">
  <h1>Before you continue...</h1>
  <img src="rose.PNG" class="rose" id="rose" onclick="startExperience()">
  <p>Press play</p>
  <p id="ours" class="fade" style="margin-top:40px; font-size:22px;">
    This is ours.
  </p>
</div>

<script>
function startExperience() {

    const rose = document.getElementById("rose");

    document.getElementById("music").play();

    document.getElementById("ours").classList.add("show");

    setTimeout(() => {
        document.getElementById("ours").classList.remove("show");
    }, 3000);

    setTimeout(() => {
        rose.classList.add("grow");
    }, 5000);

    setTimeout(() => {
        window.location.href = "page2.html";
    }, 55000);
}
</script>
</body>
</html>
