<!DOCTYPE html>
<html>
<head>
<title>For You</title>
<style>
body {
  margin:0;
  background:black;
  color:#f2f2f2;
  font-family: 'Cormorant Garamond', serif;
  text-align:center;
  overflow:hidden;
}

.container {
    text-align: center;
    margin-top: 20vh;
}

h1 {
  font-weight:300;
  letter-spacing:2px;
}

.rose {
    position: fixed;
    width: 40vw;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center center;
    transition: transform 8s ease-out;
    cursor: pointer;
}
.grow {
    transform: translate(-50%, -50%) scale(2.3) rotate(360deg);
}
.fade {
  opacity:0;
  transition: opacity 2s ease;
}

.show {
  opacity:1;
}
</style>
</head>

<body>

<audio id="music" src="love.mp3"></audio>

<div class="container">
  <h1>Before you continue...</h1>
  <img src="rose.PNG" class="rose" id="rose" onclick="startExperience()">
  <p>Press play</p>
  <p id="ours" class="fade" style="margin-top:40px; font-size:22px;">
    This is ours.
  </p>
</div>

<script>
function startExperience() {

    const rose = document.getElementById("rose");

    // Falls grow schon drauf ist → entfernen (Reset)
    rose.classList.remove("grow");

    // Reflow erzwingen (wichtig!)
    void rose.offsetWidth;

    document.getElementById("music").play();

    document.getElementById("ours").classList.add("show");

    setTimeout(function() {
        document.getElementById("ours").classList.remove("show");
    }, 3000);

    setTimeout(function() {
        rose.classList.add("grow");
    }, 5000);

    setTimeout(function() {
        window.location.href = "page2.html";
    }, 55000);
}
</script>

</body>
</html>
